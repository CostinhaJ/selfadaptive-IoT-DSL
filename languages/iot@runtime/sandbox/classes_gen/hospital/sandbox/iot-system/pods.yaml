apiVersion: v1
kind: Pod
metadata:
  name: c1
  labels:
    app: app1
spec:
  containers:
    - name: c1
      image: hospital/patient-monitor:latest
      resources:

        requests:
          memory: "500Mi"
          cpu: "500m"
      ports:
      - containerPort: 8000



  nodeSelector:
    node: edge-icu101
---
apiVersion: v1
kind: Pod
metadata:
  name: c2
  labels:
    app: app1
spec:
  containers:
    - name: c2
      image: hospital/patient-monitor:latest
      resources:

        requests:
          memory: "500Mi"
          cpu: "500m"
      ports:
      - containerPort: 8000



  nodeSelector:
    node: edge-icu102
---
apiVersion: v1
kind: Pod
metadata:
  name: c3
  labels:
    app: app2
spec:
  containers:
    - name: c3
      image: hospital/alert-service:latest
      resources:

        requests:
          memory: "700Mi"
          cpu: "700m"
      ports:
      - containerPort: 5000



  nodeSelector:
    node: fog-icu
---
apiVersion: v1
kind: Pod
metadata:
  name: c4
  labels:
    app: app3
spec:
  containers:
    - name: c4
      image: mosquitto:2.0
      resources:

        requests:
          memory: "700Mi"
          cpu: "700m"
      ports:
      - containerPort: 1883
      volumeMounts:
        - name: mosquitto-config
          mountPath:  /config/mqtt.conf
          subPath: mosquitto.conf
  volumes:
  - name: mosquitto-config
    configMap:
      name: mosquitto-config
  nodeSelector:
    node: fog-icu
---
apiVersion: v1
kind: Pod
metadata:
  name: c5
  labels:
    app: app4
spec:
  containers:
    - name: c5
      image: hospital/dashboard:latest
      resources:

        requests:
          memory: "2000Mi"
          cpu: "2000m"
      ports:
      - containerPort: 8080



  nodeSelector:
    node: cloud-hospital
---
