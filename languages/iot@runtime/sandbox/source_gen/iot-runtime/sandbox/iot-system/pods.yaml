apiVersion: v1
kind: Pod
metadata:
  name: c1
  labels:
    app: app1
spec:
  containers:
    - name: c1
      image: hotel/app1:latest
      resources:

        requests:
          memory: "500Mi"
          cpu: "500m"
      ports:
      - containerPort: 8000



  nodeSelector:
    node: edge-a1
---
apiVersion: v1
kind: Pod
metadata:
  name: c2
  labels:
    app: app1
spec:
  containers:
    - name: c2
      image: hotel/app1:latest
      resources:

        requests:
          memory: "500Mi"
          cpu: "500m"
      ports:
      - containerPort: 8000



  nodeSelector:
    node: edge-b1
---
apiVersion: v1
kind: Pod
metadata:
  name: c3
  labels:
    app: app2
spec:
  containers:
    - name: c3
      image: hotel/app2:latest
      resources:

        requests:
          memory: "900Mi"
          cpu: "900m"
      ports:
      - containerPort: 5000



  nodeSelector:
    node: fog-f1
---
apiVersion: v1
kind: Pod
metadata:
  name: c4
  labels:
    app: app3
spec:
  containers:
    - name: c4
      image: eclipse-mosquitto:2.0
      resources:

        requests:
          memory: "700Mi"
          cpu: "700m"
      ports:
      - containerPort: 1883
      volumeMounts:
        - name: mosquitto-config
          mountPath:  /config/mqtt.conf
          subPath: mosquitto.conf
  volumes:
  - name: mosquitto-config
    configMap:
      name: mosquitto-config
  nodeSelector:
    node: fog-f1
---
apiVersion: v1
kind: Pod
metadata:
  name: c5
  labels:
    app: app4
spec:
  containers:
    - name: c5
      image: hotel/app4:latest
      resources:

        requests:
          memory: "2000Mi"
          cpu: "2000m"
      ports:
      - containerPort: 8080



  nodeSelector:
    node: cloud-hotel
---
